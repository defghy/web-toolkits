name: Deploy toolkit sites to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wtool-vdiff lib & site
        working-directory: packages/wtool-vdiff
        run: pnpm run build && pnpm run build:site

      - name: Build wtool-pixel-core lib & site
        working-directory: packages/wtool-pixel-core
        run: pnpm run build && pnpm run build:site

      - name: Arrange Pages structure
        run: |
          mkdir -p _site/v-diff
          cp -r packages/wtool-vdiff/site/dist/. _site/v-diff/
          mkdir -p _site/pixel-demo
          cp -r packages/wtool-pixel-core/site/dist/. _site/pixel-demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
